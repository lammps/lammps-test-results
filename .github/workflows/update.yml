# Ingest new test results from lammps/lammps, rebuild the status website,
# deploy it to GitHub Pages, and update the rolling status issue.
name: "Update Test Status Site"

on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: site-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # pull new post-merge artifacts from lammps/lammps and refresh the
      # scraped external summaries (not on push events, those only rebuild
      # the site after code or data changes)
      - name: Ingest new results
        id: ingest
        if: ${{ github.event_name != 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 tools/ingest_actions.py --repo lammps/lammps --datadir data
          python3 tools/scrape_coverity.py --output data/external/coverity.json

      - name: Commit new data
        if: ${{ github.event_name != 'push' }}
        run: |
          if [ -n "$(git status --porcelain data)" ]
          then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "ingest new test results"
            git push
          fi

      - name: Build website
        run: python3 generator/build_site.py --datadir data --outdir _site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # the artifact name includes the attempt number so that re-running a
      # failed deployment does not trip deploy-pages over duplicate artifacts
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

      # updating an issue in another repository (e.g. lammps/lammps 5071 as set
      # in the STATUS_ISSUE_REPO / STATUS_ISSUE_NUMBER repository variables)
      # needs a token with issue write permission there in the ISSUE_TOKEN secret;
      # tolerate failure so a missing secret does not fail the whole update
      - name: Update status issue
        if: ${{ github.event_name != 'push' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ISSUE_TOKEN || github.token }}
        run: |
          python3 tools/update_issue.py \
                 --repo "${{ vars.STATUS_ISSUE_REPO || github.repository }}" \
                 --issue "${{ vars.STATUS_ISSUE_NUMBER || 0 }}" \
                 --site-url "${{ steps.deployment.outputs.page_url }}" \
                 --datadir data
